<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Livro - Library Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">📚 Library Manager</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/web/books">Livros</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/web/users">Usuários</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/web/loans">Empréstimos</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container" style="padding: 2rem 0;">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h1 class="mb-4">📚 Novo Livro</h1>

                <form th:action="@{/web/books}" method="POST" th:object="${book}">
                    <div class="card">
                        <div class="card-body">
                            <!-- Title -->
                            <div class="mb-3">
                                <label for="title" class="form-label">Título <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:classappend="${#fields.hasErrors('title') ? 'is-invalid' : ''}" 
                                       id="title" th:field="*{title}" placeholder="Ex: Clean Code">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}">
                                    <span th:errors="*{title}"></span>
                                </div>
                            </div>

                            <!-- Author -->
                            <div class="mb-3">
                                <label for="author" class="form-label">Autor <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:classappend="${#fields.hasErrors('author') ? 'is-invalid' : ''}" 
                                       id="author" th:field="*{author}" placeholder="Ex: Robert C. Martin">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('author')}">
                                    <span th:errors="*{author}"></span>
                                </div>
                            </div>

                            <!-- ISBN -->
                            <div class="mb-3">
                                <label for="isbn" class="form-label">ISBN <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:classappend="${#fields.hasErrors('isbn') ? 'is-invalid' : ''}" 
                                       id="isbn" th:field="*{isbn}" placeholder="Ex: 978-0132350884">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('isbn')}">
                                    <span th:errors="*{isbn}"></span>
                                </div>
                            </div>

                            <!-- Published Date -->
                            <div class="mb-3">
                                <label for="publishedDate" class="form-label">Data de Publicação <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" th:classappend="${#fields.hasErrors('publishedDate') ? 'is-invalid' : ''}" 
                                       id="publishedDate" th:field="*{publishedDate}">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('publishedDate')}">
                                    <span th:errors="*{publishedDate}"></span>
                                </div>
                            </div>

                            <!-- Buttons -->
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success">✓ Salvar</button>
                                <a href="/web/books" class="btn btn-secondary">← Voltar</a>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer style="background-color: #f8f9fa; border-top: 1px solid #dee2e6; margin-top: 2rem; padding: 1rem 0; text-align: center; color: #6c757d;">
        <p>&copy; 2026 Library Manager MVP. Arquitetura Monólito Modular em Camadas com Spring Boot 3.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
