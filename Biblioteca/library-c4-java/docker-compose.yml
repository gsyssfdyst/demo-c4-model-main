services:
  postgres:
    image: postgres:16-alpine
    container_name: library-c4-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: library_c4
      POSTGRES_USER: library
      POSTGRES_PASSWORD: library
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
